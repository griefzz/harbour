<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>404 Not Found</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <div class="h-screen w-screen bg-gray-900 flex flex-col">
        <div
            class="bg-gray-900 self-stretch flex w-full flex-col px-20 py-80 max-md:max-w-full max-md:px-5 max-md:py-24">
            <div class="self-center flex mb-0 w-[289px] max-w-full flex-col max-md:mb-2.5">
                <div
                    class="text-white text-opacity-90 text-center text-5xl leading-[60px] self-center w-full max-md:text-4xl">
                    404
                </div>
                <div class="text-neutral-400 text-center text-xl leading-8 self-stretch mt-4">
                    File doesn’t exist, try elsewhere.
                </div>
                <a href="/"
                    class="text-white text-center text-base leading-6 self-center border bg-sky-600 w-32 max-w-full grow mt-4 pl-11 pr-11 py-4 rounded-sm border-solid border-sky-600 max-md:px-5">
                    Home
                </a>
            </div>
        </div>
    </div>
</body>

</html>
